<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lunamy · Joyería</title>
<link rel="icon" type="image/png" href="images/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tenor+Sans&family=Poppins:wght@300;400;500;600&family=Alex+Brush&display=swap" rel="stylesheet">
<style>
  :root{
    --purple:#684d9a;
    --purple-dark:#523d7a;
    --lavender:#bfb3d7;
    --lavender-soft: #ece8f4;
    --bg:#fbfaf9;
    --surface:#ffffff;
    --line: #e7e1ee;
    --gold:#c9a876;
    --text:#2b2138;
    --text-muted:#8a7f97;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html{scroll-behavior:smooth;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Poppins', sans-serif;
    font-weight:300;
    min-height:100vh;
  }
  a{color:inherit; text-decoration:none;}
  img{max-width:100%; display:block;}

  /* ---------- Moon phase signature element ---------- */
  .moon{
    width:12px; height:12px; border-radius:50%;
    background: var(--lavender);
    box-shadow: inset 5px -1px 0 0 var(--purple);
    display:inline-block;
    flex-shrink:0;
  }
  .moon.crescent{ box-shadow: inset 8px -2px 0 0 var(--purple); }
  .moon.gibbous{ box-shadow: inset 3px -1px 0 0 var(--purple); }
  .moon.full{ box-shadow:none; }
  .moon.new{ background:transparent; border:1px solid var(--lavender); }

  .phase-divider{
    display:flex; align-items:center; justify-content:center; gap:10px;
    margin: 0 0 40px;
  }
  .phase-divider .moon{ width:8px; height:8px; opacity:.6; }
  .phase-divider .moon.active{ opacity:1; width:10px; height:10px; }
  .phase-divider .rule{ height:1px; width:56px; background: var(--line); }

  /* ---------- Header ---------- */
  header{
    background: linear-gradient(135deg, var(--purple), var(--purple-dark));
    padding: 64px 6vw 56px;
    text-align:center;
    position:relative;
  }
  .brand{
    display:flex; align-items:baseline; justify-content:center; gap:10px;
    margin-bottom:6px;
  }
  .logo-img{
  max-width: 320px;
  width: 60%;
  height: auto;
  }
  h1{
    font-family:'Alex Brush', cursive;
    font-weight:400;
    font-size: clamp(3.2rem, 9vw, 5.4rem);
    color: var(--lavender-soft);
    line-height:1;
  }
  .star{ color: var(--lavender-soft); font-size:1.4rem; align-self:flex-start; margin-top:8px; }
  .tagline{
    font-family:'Tenor Sans', sans-serif;
    font-size: 0.95rem;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--lavender-soft);
    opacity:.85;
  }

  /* ---------- Category nav ---------- */
  nav.categories{
    display:flex; flex-wrap:wrap; gap:10px; justify-content:center;
    padding: 40px 6vw 10px;
  }
  nav.categories button{
    font-family:'Tenor Sans', sans-serif;
    font-size:0.75rem; letter-spacing:0.1em; text-transform:uppercase;
    padding:11px 22px;
    border-radius:999px;
    border:1px solid var(--line);
    background: var(--surface);
    color:var(--text-muted);
    cursor:pointer;
    transition: all .25s ease;
  }
  nav.categories button:hover{ color:var(--purple); border-color:var(--purple); }
  nav.categories button.active{
    background: var(--purple);
    color:#fff;
    border-color: var(--purple);
  }

  /* ---------- Product grid ---------- */
  main{ padding: 10px 6vw 90px; max-width:1280px; margin:0 auto; }
  .grid{
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 26px;
  }
  .card{
    background: var(--surface);
    border:1px solid var(--line);
    border-radius: 4px;
    overflow:hidden;
    display:flex; flex-direction:column;
    transition: transform .3s ease, box-shadow .3s ease;
  }
  .card:hover{ transform: translateY(-5px); box-shadow: 0 16px 30px rgba(104,77,154,0.14); }
  .thumb{
  aspect-ratio: 1 / 1;
  display:flex; align-items:center; justify-content:center;
  font-size: 2.8rem;
  background: var(--lavender-soft);
  position:relative;
  overflow:hidden;
}
.thumb.no-photo::after{
  content:"Foto pendiente";
  position:absolute; bottom:10px; left:0; right:0;
  text-align:center;
  font-family:'Tenor Sans', sans-serif;
  font-size:0.6rem; letter-spacing:0.1em; text-transform:uppercase;
  color: var(--purple); opacity:.5;
}
.thumb-img{
  width:100%; height:100%; object-fit:cover; cursor:pointer;
}
.thumb-dots{
  position:absolute; bottom:8px; left:0; right:0;
  display:flex; justify-content:center; gap:6px;
}
.thumb-dots .dot{
  width:6px; height:6px; border-radius:50%;
  background: rgba(255,255,255,0.6);
  transition: background .2s ease, transform .2s ease;
}
.thumb-dots .dot.active{
  background: #fff;
  transform: scale(1.3);
}
.sold-out-thumb .thumb-img,
.sold-out-thumb .thumb-dots{
  opacity: 0.4;
}
.sold-out-badge{
  position:absolute; top:12px; left:12px;
  background: var(--purple-dark);
  color:#fff;
  font-family:'Tenor Sans', sans-serif;
  font-size:0.62rem; letter-spacing:0.1em; text-transform:uppercase;
  padding:5px 12px;
  border-radius:999px;
}
.order-btn.disabled{
  background: #cbc3d6;
  color:#8a7f97;
  cursor: default;
  pointer-events: none;
}
  
  .info{ padding: 20px 20px 22px; display:flex; flex-direction:column; gap:6px; flex:1; }
  .cat-label{ font-family:'Tenor Sans', sans-serif; font-size:0.62rem; letter-spacing:0.14em; text-transform:uppercase; color: var(--purple); }
  .name{ font-family:'Tenor Sans', sans-serif; font-size:1.05rem; letter-spacing:0.01em; margin-top:2px; }
  .desc{ font-size:0.8rem; color:var(--text-muted); line-height:1.5; flex:1; }
  .row-bottom{ display:flex; align-items:center; justify-content:space-between; margin-top:12px; gap:10px; }
  .price{ font-family:'Tenor Sans', sans-serif; font-size:1.05rem; color: var(--gold); }
  .order-btn{
    display:flex; align-items:center; gap:6px;
    background: var(--purple);
    color:#fff;
    font-family:'Tenor Sans', sans-serif;
    font-size:0.7rem; letter-spacing:0.05em; text-transform:uppercase;
    padding: 10px 16px; border-radius:2px;
    border:none; cursor:pointer;
    transition: background .25s ease, transform .2s ease;
  }
  .order-btn:hover{ background: var(--purple-dark); }
  .order-btn svg{ width:13px; height:13px; }

  .empty{
    text-align:center; color:var(--text-muted); padding:60px 20px; font-family:'Tenor Sans', sans-serif; font-size:1rem;
  }

  /* ---------- Floating WhatsApp ---------- */
  .float-wa{
    position:fixed; bottom:24px; right:24px;
    width:54px; height:54px; border-radius:50%;
    background: var(--purple);
    display:flex; align-items:center; justify-content:center;
    box-shadow: 0 8px 22px rgba(104,77,154,0.4);
    z-index:50;
    transition: transform .25s ease;
  }
  .float-wa:hover{ transform: scale(1.08); }
  .float-wa svg{ width:24px; height:24px; fill:#fff; }

  footer{
  text-align:center; padding: 44px 6vw 56px;
  background: var(--lavender-soft);
  color:var(--text-muted); font-size:0.78rem;
}
.footer-logo-img{
  max-width: 160px;
  width: 40%;
  height: auto;
  margin: 0 auto 10px;
}
footer p{ font-family:'Tenor Sans', sans-serif; letter-spacing:0.04em; }
.social-links{
  display:flex; justify-content:center; gap:16px;
  margin-top:18px;
}
.social-links a{
  color: var(--purple);
  transition: color .2s ease, transform .2s ease;
}
.social-links a:hover{ color: var(--purple-dark); transform: translateY(-2px); }
.social-links svg{ width:20px; height:20px; }

  @media (max-width:480px){
    header{ padding:48px 6vw 44px; }
    nav.categories{ gap:8px; padding-top:32px; }
    nav.categories button{ padding:9px 16px; font-size:0.68rem; }
  }
</style>
</head>
<body>

<header>
  <div class="brand">
     <img src="images/morado-sin-fondo.png" alt="Lunamy" class="logo-img">
  </div>
</header>

<div class="phase-divider" style="margin-top:36px;">
  <span class="moon new"></span>
  <span class="rule"></span>
  <span class="moon crescent active"></span>
  <span class="rule"></span>
  <span class="moon full"></span>
</div>

<nav class="categories" id="categoryNav"></nav>

<main>
  <div class="grid" id="grid"></div>
  <p class="empty" id="emptyMsg" style="display:none;">Aún no hay piezas en esta categoría.</p>
</main>

<a class="float-wa" id="floatWa" href="#" target="_blank" title="Escríbenos por WhatsApp">
  <svg viewBox="0 0 24 24"><path d="M12.04 2C6.58 2 2.13 6.45 2.13 11.91c0 1.75.46 3.46 1.32 4.96L2.05 22l5.25-1.38a9.9 9.9 0 0 0 4.74 1.21h.01c5.46 0 9.91-4.45 9.91-9.91C21.96 6.46 17.5 2 12.04 2zm0 18.1a8.2 8.2 0 0 1-4.19-1.15l-.3-.18-3.12.82.83-3.04-.2-.31a8.19 8.19 0 0 1-1.25-4.33c0-4.52 3.68-8.2 8.22-8.2 4.53 0 8.21 3.68 8.21 8.2 0 4.53-3.68 8.2-8.2 8.2zm4.51-6.14c-.25-.12-1.46-.72-1.68-.8-.23-.08-.39-.12-.56.12-.16.25-.64.8-.78.96-.14.17-.29.19-.53.06-.25-.12-1.04-.38-1.98-1.21-.73-.65-1.22-1.46-1.37-1.7-.14-.25-.02-.38.11-.5.11-.11.25-.29.37-.43.13-.15.17-.25.25-.42.08-.16.04-.31-.02-.43-.06-.12-.56-1.34-.76-1.84-.2-.48-.4-.42-.56-.42-.14-.01-.3-.01-.47-.01a.9.9 0 0 0-.65.3c-.22.25-.86.84-.86 2.04 0 1.2.88 2.37 1 2.53.12.17 1.74 2.66 4.22 3.72.59.26 1.05.41 1.41.52.59.19 1.13.16 1.56.1.48-.07 1.46-.6 1.66-1.17.21-.58.21-1.08.15-1.18-.06-.11-.22-.17-.47-.29z"/></svg>
</a>

<footer>
  <img src="images/logo-sin-fondo.png" alt="Lunamy" class="footer-logo-img">
  <p>Joyería &amp; accesorios · Pedidos directos por WhatsApp</p>
  <div class="social-links">
    <a href="https://instagram.com/lunamy.muse" target="_blank" title="Instagram">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2c-2.7 0-3.05.01-4.12.06-1.06.05-1.79.22-2.43.47-.66.26-1.22.6-1.77 1.16-.56.55-.9 1.11-1.16 1.77-.25.64-.42 1.37-.47 2.43C2 8.95 2 9.3 2 12s.01 3.05.06 4.12c.05 1.06.22 1.79.47 2.43.26.66.6 1.22 1.16 1.77.55.56 1.11.9 1.77 1.16.64.25 1.37.42 2.43.47C8.95 22 9.3 22 12 22s3.05-.01 4.12-.06c1.06-.05 1.79-.22 2.43-.47.66-.26 1.22-.6 1.77-1.16.56-.55.9-1.11 1.16-1.77.25-.64.42-1.37.47-2.43.05-1.07.06-1.42.06-4.12s-.01-3.05-.06-4.12c-.05-1.06-.22-1.79-.47-2.43-.26-.66-.6-1.22-1.16-1.77-.55-.56-1.11-.9-1.77-1.16-.64-.25-1.37-.42-2.43-.47C15.05 2 14.7 2 12 2zm0 1.8c2.67 0 2.99.01 4.04.06.97.04 1.5.21 1.85.34.47.18.8.4 1.15.75.35.35.57.68.75 1.15.13.35.3.88.34 1.85.05 1.05.06 1.37.06 4.04s-.01 2.99-.06 4.04c-.04.97-.21 1.5-.34 1.85-.18.47-.4.8-.75 1.15-.35.35-.68.57-1.15.75-.35.13-.88.3-1.85.34-1.05.05-1.37.06-4.04.06s-2.99-.01-4.04-.06c-.97-.04-1.5-.21-1.85-.34-.47-.18-.8-.4-1.15-.75-.35-.35-.57-.68-.75-1.15-.13-.35-.3-.88-.34-1.85C3.81 14.99 3.8 14.67 3.8 12s.01-2.99.06-4.04c.04-.97.21-1.5.34-1.85.18-.47.4-.8.75-1.15.35-.35.68-.57 1.15-.75.35-.13.88-.3 1.85-.34C9.01 3.81 9.33 3.8 12 3.8zm0 3.05a5.15 5.15 0 1 0 0 10.3 5.15 5.15 0 0 0 0-10.3zm0 8.5a3.35 3.35 0 1 1 0-6.7 3.35 3.35 0 0 1 0 6.7zm5.35-8.7a1.2 1.2 0 1 1-2.4 0 1.2 1.2 0 0 1 2.4 0z"/></svg>
    </a>
    <a href="https://tiktok.com/@_lunamyshop" target="_blank" title="TikTok">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16.6 5.82s.51.5 0 0A4.278 4.278 0 0 1 15.54 3h-3.09v12.4a2.592 2.592 0 0 1-2.59 2.5c-1.42 0-2.6-1.16-2.6-2.6 0-1.72 1.66-3.01 3.37-2.48V9.66c-3.45-.46-6.47 2.22-6.47 5.64 0 3.33 2.76 5.7 5.69 5.7 3.14 0 5.69-2.55 5.69-5.7V9.01a7.35 7.35 0 0 0 4.3 1.38V7.3s-1.88.09-3.24-1.48z"/></svg>
    </a>
  </div>
</footer>

<script>
  // ======= CONFIGURA AQUÍ =======
  const WHATSAPP_NUMBER = "573137624176"; // reemplaza por tu número con código de país, sin + ni espacios

  // ======= PRODUCTOS DE EJEMPLO — reemplaza con tus productos reales =======
  const PRODUCTS = [
    { name: "Conjunto Maripositas 🦋", category: "Collares", desc: "", price: "34.000", images: ["images/cadena-mariposa.jpeg", "images/conjunto-mariposa.jpeg"], soldOut: true },
    { name: "Topitos Huellitas 🐾", category: "Aretes", desc: "", price: "8.000", img: "images/topitos-huellitas.jpeg"  },
    { name: "Topitos Corazón ❤️", category: "Aretes", desc: "", price: "8.000", img: "images/topitos-corazon.jpeg" },
    { name: "Argollas Ovaladas medianas ✨", category: "Aretes", desc: "", price: "16.000", img: "images/argollas-ovaladas-medianas.jpeg"  },
    { name: "Argollas pequeñas ✨", category: "Aretes", desc: "", price: "12.000", img: "images/argollas-pequeñas.jpeg"  },
    { name: "Argollas Medianas ✨", category: "Aretes", desc: "", price: "12.000", img: "images/argollas-medianas.jpeg"  },
    { name: "Argollas grandes ✨", category: "Aretes", desc: "", price: "12.000", img: "images/argollas-grandes.jpeg", soldOut: true },
    { name: "Argollas trenzadas ✨", category: "Aretes", desc: "", price: "12.000", img: "images/argollas-trenzadas.jpeg", soldOut: true }
  ];

  const grid = document.getElementById('grid');
  const nav = document.getElementById('categoryNav');
  const emptyMsg = document.getElementById('emptyMsg');
  const floatWa = document.getElementById('floatWa');

  floatWa.href = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent('¡Hola Lunamy! Quisiera más información sobre sus productos ✨')}`;

  const categories = ["Todo", ...new Set(PRODUCTS.map(p => p.category))];

  let activeCategory = "Todo";

  function renderNav(){
    nav.innerHTML = "";
    categories.forEach(cat => {
      const btn = document.createElement('button');
      btn.textContent = cat;
      if(cat === activeCategory) btn.classList.add('active');
      btn.addEventListener('click', () => {
        activeCategory = cat;
        renderNav();
        renderGrid();
      });
      nav.appendChild(btn);
    });
  }

  function renderGrid(){
    grid.innerHTML = "";
    const filtered = activeCategory === "Todo" ? PRODUCTS : PRODUCTS.filter(p => p.category === activeCategory);
    emptyMsg.style.display = filtered.length ? "none" : "block";

    filtered.forEach(p => {
  const card = document.createElement('div');
  card.className = "card";

  const message = encodeURIComponent(`¡Hola Lunamy! Me interesa este producto:\n\n${p.name} — $${p.price}\n\n¿Está disponible?`);
  const waLink = `https://wa.me/${WHATSAPP_NUMBER}?text=${message}`;

  // Junta las fotos, sea que uses "images: [...]" (nuevo) o "img: '...'" (viejo)
  const imgs = p.images && p.images.length ? p.images : (p.img ? [p.img] : []);

  const thumbContent = imgs.length
    ? `<img src="${imgs[0]}" alt="${p.name}" class="thumb-img">`
    : p.icon;

  const dots = imgs.length > 1
    ? `<div class="thumb-dots">${imgs.map((_, i) => `<span class="dot${i === 0 ? ' active' : ''}"></span>`).join('')}</div>`
    : "";

  const soldOutBadge = p.soldOut ? `<div class="sold-out-badge">Agotado</div>` : "";

const orderButton = p.soldOut
  ? `<span class="order-btn disabled">Agotado</span>`
  : `<a class="order-btn" href="${waLink}" target="_blank">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12.04 2C6.58 2 2.13 6.45 2.13 11.91c0 1.75.46 3.46 1.32 4.96L2.05 22l5.25-1.38a9.9 9.9 0 0 0 4.74 1.21h.01c5.46 0 9.91-4.45 9.91-9.91C21.96 6.46 17.5 2 12.04 2zm4.51 11.96c-.25-.12-1.46-.72-1.68-.8-.23-.08-.39-.12-.56.12-.16.25-.64.8-.78.96-.14.17-.29.19-.53.06-.25-.12-1.04-.38-1.98-1.21-.73-.65-1.22-1.46-1.37-1.7-.14-.25-.02-.38.11-.5.11-.11.25-.29.37-.43.13-.15.17-.25.25-.42.08-.16.04-.31-.02-.43-.06-.12-.56-1.34-.76-1.84-.2-.48-.4-.42-.56-.42-.14-.01-.3-.01-.47-.01a.9.9 0 0 0-.65.3c-.22.25-.86.84-.86 2.04 0 1.2.88 2.37 1 2.53.12.17 1.74 2.66 4.22 3.72.59.26 1.05.41 1.41.52.59.19 1.13.16 1.56.1.48-.07 1.46-.6 1.66-1.17.21-.58.21-1.08.15-1.18-.06-.11-.22-.17-.47-.29z"/></svg>
      Pedir
    </a>`;

card.innerHTML = `
  <div class="thumb${imgs.length ? '' : ' no-photo'}${p.soldOut ? ' sold-out-thumb' : ''}">
    ${thumbContent}
    ${dots}
    ${soldOutBadge}
  </div>
  <div class="info">
    <span class="cat-label">${p.category}</span>
    <span class="name">${p.name}</span>
    <p class="desc">${p.desc}</p>
    <div class="row-bottom">
      <span class="price">$${p.price}</span>
      ${orderButton}
    </div>
  </div>
`;

  // Si el producto tiene más de una foto, permite pasar a la siguiente al hacer clic
  if (imgs.length > 1) {
    const thumbImg = card.querySelector('.thumb-img');
    const dotEls = card.querySelectorAll('.dot');
    let current = 0;
    thumbImg.addEventListener('click', () => {
      current = (current + 1) % imgs.length;
      thumbImg.src = imgs[current];
      dotEls.forEach((d, i) => d.classList.toggle('active', i === current));
    });
  }

  grid.appendChild(card);
});
  }

  renderNav();
  renderGrid();
</script>

</body>
</html>
