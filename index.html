<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lunamy · Joyería</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tenor+Sans&family=Poppins:wght@300;400;500;600&family=Alex+Brush&display=swap" rel="stylesheet">
<style>
  :root{
    --purple:#684d9a;
    --purple-dark:#523d7a;
    --lavender:#bfb3d7;
    --lavender-soft: #ece8f4;
    --bg:#fbfaf9;
    --surface:#ffffff;
    --line: #e7e1ee;
    --gold:#c9a876;
    --text:#2b2138;
    --text-muted:#8a7f97;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html{scroll-behavior:smooth;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Poppins', sans-serif;
    font-weight:300;
    min-height:100vh;
  }
  a{color:inherit; text-decoration:none;}
  img{max-width:100%; display:block;}

  /* ---------- Moon phase signature element ---------- */
  .moon{
    width:12px; height:12px; border-radius:50%;
    background: var(--lavender);
    box-shadow: inset 5px -1px 0 0 var(--purple);
    display:inline-block;
    flex-shrink:0;
  }
  .moon.crescent{ box-shadow: inset 8px -2px 0 0 var(--purple); }
  .moon.gibbous{ box-shadow: inset 3px -1px 0 0 var(--purple); }
  .moon.full{ box-shadow:none; }
  .moon.new{ background:transparent; border:1px solid var(--lavender); }

  .phase-divider{
    display:flex; align-items:center; justify-content:center; gap:10px;
    margin: 0 0 40px;
  }
  .phase-divider .moon{ width:8px; height:8px; opacity:.6; }
  .phase-divider .moon.active{ opacity:1; width:10px; height:10px; }
  .phase-divider .rule{ height:1px; width:56px; background: var(--line); }

  /* ---------- Header ---------- */
  header{
    background: linear-gradient(135deg, var(--purple), var(--purple-dark));
    padding: 64px 6vw 56px;
    text-align:center;
    position:relative;
  }
  .brand{
    display:flex; align-items:baseline; justify-content:center; gap:10px;
    margin-bottom:6px;
  }
  h1{
    font-family:'Alex Brush', cursive;
    font-weight:400;
    font-size: clamp(3.2rem, 9vw, 5.4rem);
    color: var(--lavender-soft);
    line-height:1;
  }
  .star{ color: var(--lavender-soft); font-size:1.4rem; align-self:flex-start; margin-top:8px; }
  .tagline{
    font-family:'Tenor Sans', sans-serif;
    font-size: 0.95rem;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--lavender-soft);
    opacity:.85;
  }

  /* ---------- Category nav ---------- */
  nav.categories{
    display:flex; flex-wrap:wrap; gap:10px; justify-content:center;
    padding: 40px 6vw 10px;
  }
  nav.categories button{
    font-family:'Tenor Sans', sans-serif;
    font-size:0.75rem; letter-spacing:0.1em; text-transform:uppercase;
    padding:11px 22px;
    border-radius:999px;
    border:1px solid var(--line);
    background: var(--surface);
    color:var(--text-muted);
    cursor:pointer;
    transition: all .25s ease;
  }
  nav.categories button:hover{ color:var(--purple); border-color:var(--purple); }
  nav.categories button.active{
    background: var(--purple);
    color:#fff;
    border-color: var(--purple);
  }

  /* ---------- Product grid ---------- */
  main{ padding: 10px 6vw 90px; max-width:1280px; margin:0 auto; }
  .grid{
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 26px;
  }
  .card{
    background: var(--surface);
    border:1px solid var(--line);
    border-radius: 4px;
    overflow:hidden;
    display:flex; flex-direction:column;
    transition: transform .3s ease, box-shadow .3s ease;
  }
  .card:hover{ transform: translateY(-5px); box-shadow: 0 16px 30px rgba(104,77,154,0.14); }
  .thumb{
    aspect-ratio: 1 / 1;
    display:flex; align-items:center; justify-content:center;
    font-size: 2.8rem;
    background: var(--lavender-soft);
    position:relative;
  }
  .thumb::after{
    content:"Foto pendiente";
    position:absolute; bottom:10px; left:0; right:0;
    text-align:center;
    font-family:'Tenor Sans', sans-serif;
    font-size:0.6rem; letter-spacing:0.1em; text-transform:uppercase;
    color: var(--purple); opacity:.5;
  }
  .info{ padding: 20px 20px 22px; display:flex; flex-direction:column; gap:6px; flex:1; }
  .cat-label{ font-family:'Tenor Sans', sans-serif; font-size:0.62rem; letter-spacing:0.14em; text-transform:uppercase; color: var(--purple); }
  .name{ font-family:'Tenor Sans', sans-serif; font-size:1.05rem; letter-spacing:0.01em; margin-top:2px; }
  .desc{ font-size:0.8rem; color:var(--text-muted); line-height:1.5; flex:1; }
  .row-bottom{ display:flex; align-items:center; justify-content:space-between; margin-top:12px; gap:10px; }
  .price{ font-family:'Tenor Sans', sans-serif; font-size:1.05rem; color: var(--gold); }
  .order-btn{
    display:flex; align-items:center; gap:6px;
    background: var(--purple);
    color:#fff;
    font-family:'Tenor Sans', sans-serif;
    font-size:0.7rem; letter-spacing:0.05em; text-transform:uppercase;
    padding: 10px 16px; border-radius:2px;
    border:none; cursor:pointer;
    transition: background .25s ease, transform .2s ease;
  }
  .order-btn:hover{ background: var(--purple-dark); }
  .order-btn svg{ width:13px; height:13px; }

  .empty{
    text-align:center; color:var(--text-muted); padding:60px 20px; font-family:'Tenor Sans', sans-serif; font-size:1rem;
  }

  /* ---------- Floating WhatsApp ---------- */
  .float-wa{
    position:fixed; bottom:24px; right:24px;
    width:54px; height:54px; border-radius:50%;
    background: var(--purple);
    display:flex; align-items:center; justify-content:center;
    box-shadow: 0 8px 22px rgba(104,77,154,0.4);
    z-index:50;
    transition: transform .25s ease;
  }
  .float-wa:hover{ transform: scale(1.08); }
  .float-wa svg{ width:24px; height:24px; fill:#fff; }

  footer{
    text-align:center; padding: 44px 6vw 56px;
    background: var(--lavender-soft);
    color:var(--text-muted); font-size:0.78rem;
  }
  footer .brand-mini{ font-family:'Alex Brush', cursive; color:var(--purple); font-size:1.8rem; margin-bottom:6px; }
  footer p{ font-family:'Tenor Sans', sans-serif; letter-spacing:0.04em; }

  @media (max-width:480px){
    header{ padding:48px 6vw 44px; }
    nav.categories{ gap:8px; padding-top:32px; }
    nav.categories button{ padding:9px 16px; font-size:0.68rem; }
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <h1>Lunamy</h1>
    <span class="star">✦</span>
  </div>
  <p class="tagline">Joyería</p>
</header>

<div class="phase-divider" style="margin-top:36px;">
  <span class="moon new"></span>
  <span class="rule"></span>
  <span class="moon crescent active"></span>
  <span class="rule"></span>
  <span class="moon full"></span>
</div>

<nav class="categories" id="categoryNav"></nav>

<main>
  <div class="grid" id="grid"></div>
  <p class="empty" id="emptyMsg" style="display:none;">Aún no hay piezas en esta categoría.</p>
</main>

<a class="float-wa" id="floatWa" href="#" target="_blank" title="Escríbenos por WhatsApp">
  <svg viewBox="0 0 24 24"><path d="M12.04 2C6.58 2 2.13 6.45 2.13 11.91c0 1.75.46 3.46 1.32 4.96L2.05 22l5.25-1.38a9.9 9.9 0 0 0 4.74 1.21h.01c5.46 0 9.91-4.45 9.91-9.91C21.96 6.46 17.5 2 12.04 2zm0 18.1a8.2 8.2 0 0 1-4.19-1.15l-.3-.18-3.12.82.83-3.04-.2-.31a8.19 8.19 0 0 1-1.25-4.33c0-4.52 3.68-8.2 8.22-8.2 4.53 0 8.21 3.68 8.21 8.2 0 4.53-3.68 8.2-8.2 8.2zm4.51-6.14c-.25-.12-1.46-.72-1.68-.8-.23-.08-.39-.12-.56.12-.16.25-.64.8-.78.96-.14.17-.29.19-.53.06-.25-.12-1.04-.38-1.98-1.21-.73-.65-1.22-1.46-1.37-1.7-.14-.25-.02-.38.11-.5.11-.11.25-.29.37-.43.13-.15.17-.25.25-.42.08-.16.04-.31-.02-.43-.06-.12-.56-1.34-.76-1.84-.2-.48-.4-.42-.56-.42-.14-.01-.3-.01-.47-.01a.9.9 0 0 0-.65.3c-.22.25-.86.84-.86 2.04 0 1.2.88 2.37 1 2.53.12.17 1.74 2.66 4.22 3.72.59.26 1.05.41 1.41.52.59.19 1.13.16 1.56.1.48-.07 1.46-.6 1.66-1.17.21-.58.21-1.08.15-1.18-.06-.11-.22-.17-.47-.29z"/></svg>
</a>

<footer>
  <p class="brand-mini">Lunamy</p>
  <p>Joyería &amp; accesorios · Pedidos directos por WhatsApp</p>
</footer>

<script>
  // ======= CONFIGURA AQUÍ =======
  const WHATSAPP_NUMBER = "573022092907"; // reemplaza por tu número con código de país, sin + ni espacios

  // ======= PRODUCTOS DE EJEMPLO — reemplaza con tus productos reales =======
  const PRODUCTS = [
    { name: "Aretes Media Luna", category: "Aretes", price: "35.000", desc: "Aretes colgantes en forma de luna creciente, baño en oro.", icon: "🌙" },
    { name: "Aretes Perla Mini", category: "Aretes", price: "28.000", desc: "Aretes delicados con perla sintética, ideales para el día a día.", icon: "🤍" },
    { name: "Collar Estelar", category: "Collares", price: "48.000", desc: "Cadena fina con dije de estrella y circonias.", icon: "⭐" },
    { name: "Collar Gargantilla Luna", category: "Collares", price: "42.000", desc: "Gargantilla ajustable con dije lunar en acero inoxidable.", icon: "🌘" },
    { name: "Pulsera Fases Lunares", category: "Pulseras", price: "39.000", desc: "Pulsera con dijes representando las fases de la luna.", icon: "✨" },
    { name: "Pulsera Cadena Fina", category: "Pulseras", price: "25.000", desc: "Cadena delicada bañada en oro, ajustable.", icon: "🔗" },
    { name: "Anillo Solitario", category: "Anillos", price: "30.000", desc: "Anillo minimalista con circonia central.", icon: "💍" },
    { name: "Anillo Ajustable Luna", category: "Anillos", price: "27.000", desc: "Anillo ajustable con detalle de media luna.", icon: "🌒" }
  ];

  const grid = document.getElementById('grid');
  const nav = document.getElementById('categoryNav');
  const emptyMsg = document.getElementById('emptyMsg');
  const floatWa = document.getElementById('floatWa');

  floatWa.href = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent('¡Hola Lunamy! Quisiera más información sobre sus productos ✨')}`;

  const categories = ["Todo", ...new Set(PRODUCTS.map(p => p.category))];

  let activeCategory = "Todo";

  function renderNav(){
    nav.innerHTML = "";
    categories.forEach(cat => {
      const btn = document.createElement('button');
      btn.textContent = cat;
      if(cat === activeCategory) btn.classList.add('active');
      btn.addEventListener('click', () => {
        activeCategory = cat;
        renderNav();
        renderGrid();
      });
      nav.appendChild(btn);
    });
  }

  function renderGrid(){
    grid.innerHTML = "";
    const filtered = activeCategory === "Todo" ? PRODUCTS : PRODUCTS.filter(p => p.category === activeCategory);
    emptyMsg.style.display = filtered.length ? "none" : "block";

    filtered.forEach(p => {
      const card = document.createElement('div');
      card.className = "card";

      const message = encodeURIComponent(`¡Hola Lunamy! Me interesa este producto:\n\n${p.name} — $${p.price}\n\n¿Está disponible?`);
      const waLink = `https://wa.me/${WHATSAPP_NUMBER}?text=${message}`;

      card.innerHTML = `
        <div class="thumb">${p.icon}</div>
        <div class="info">
          <span class="cat-label">${p.category}</span>
          <span class="name">${p.name}</span>
          <p class="desc">${p.desc}</p>
          <div class="row-bottom">
            <span class="price">$${p.price}</span>
            <a class="order-btn" href="${waLink}" target="_blank">
              <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12.04 2C6.58 2 2.13 6.45 2.13 11.91c0 1.75.46 3.46 1.32 4.96L2.05 22l5.25-1.38a9.9 9.9 0 0 0 4.74 1.21h.01c5.46 0 9.91-4.45 9.91-9.91C21.96 6.46 17.5 2 12.04 2zm4.51 11.96c-.25-.12-1.46-.72-1.68-.8-.23-.08-.39-.12-.56.12-.16.25-.64.8-.78.96-.14.17-.29.19-.53.06-.25-.12-1.04-.38-1.98-1.21-.73-.65-1.22-1.46-1.37-1.7-.14-.25-.02-.38.11-.5.11-.11.25-.29.37-.43.13-.15.17-.25.25-.42.08-.16.04-.31-.02-.43-.06-.12-.56-1.34-.76-1.84-.2-.48-.4-.42-.56-.42-.14-.01-.3-.01-.47-.01a.9.9 0 0 0-.65.3c-.22.25-.86.84-.86 2.04 0 1.2.88 2.37 1 2.53.12.17 1.74 2.66 4.22 3.72.59.26 1.05.41 1.41.52.59.19 1.13.16 1.56.1.48-.07 1.46-.6 1.66-1.17.21-.58.21-1.08.15-1.18-.06-.11-.22-.17-.47-.29z"/></svg>
              Pedir
            </a>
          </div>
        </div>
      `;
      grid.appendChild(card);
    });
  }

  renderNav();
  renderGrid();
</script>

</body>
</html>
